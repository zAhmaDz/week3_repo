name: Self-Hosted CI/CD

on:
  push:
    branches:
      - "master"

jobs:
  build-and-push:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker config and login
        run: |
          export DOCKER_CONFIG=/tmp/docker-config
          mkdir -p $DOCKER_CONFIG
          echo "${{ secrets.SECRET }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        env:
          DOCKER_CONFIG: /tmp/docker-config
        with:
          context: ./
          push: true
          tags: ghcr.io/zahmadz/week3_repo:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        env:
          DOCKER_CONFIG: /tmp/docker-config
        with:
          context: ./templates
          push: true
          tags: ghcr.io/zahmadz/week3_repo/templates:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker config and login
        run: |
          export DOCKER_CONFIG=/tmp/docker-config
          mkdir -p $DOCKER_CONFIG
          echo "${{ secrets.SECRET }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        env:
          DOCKER_CONFIG: /tmp/docker-config
        run: |
          docker pull ghcr.io/zahmadz/week3_repo:latest
          docker pull ghcr.io/zahmadz/week3_repo/templates:latest

      - name: Run new containers
        run: |
          cd /home/cybersecurity/some
          docker compose down
          docker system prune -f
          ./vault-secret.sh
          docker compose up -d
          
