name: Self-Hosted CI/CD

on:
  push:
    branches:
      - "master"

jobs:
  build-and-push:
    runs-on: self-hosted
    # This env block tells GitHub Actions to use the Docker Desktop socket
    env:
      DOCKER_HOST: unix:///home/cybersecurity/.docker/desktop/docker.sock

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker config and login
        run: |
          export DOCKER_CONFIG=/tmp/docker-config
          mkdir -p $DOCKER_CONFIG
          echo "${{ secrets.SECRET }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        env:
          DOCKER_CONFIG: /tmp/docker-config
        with:
          context: ./
          push: true
          tags: ghcr.io/zahmadz/week3_repo:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        env:
          DOCKER_CONFIG: /tmp/docker-config
        with:
          context: ./templates
          push: true
          tags: ghcr.io/zahmadz/week3_repo/templates:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    env:
      DOCKER_HOST: unix:///home/cybersecurity/.docker/desktop/docker.sock

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker config and login
        run: |
          export DOCKER_CONFIG=/tmp/docker-config
          mkdir -p $DOCKER_CONFIG
          echo "${{ secrets.SECRET }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        env:
          DOCKER_CONFIG: /tmp/docker-config
        run: |
          docker pull ghcr.io/zahmadz/week3_repo:latest
          docker pull ghcr.io/zahmadz/week3_repo/templates:latest

      - name: Run new containers
        run: |
          cd /home/cybersecurity/some
          # Stop current containers
          docker compose down
          # Clean up old images/cache
          docker system prune -f
          # Fetch secrets from Vault and generate .env
          chmod +x ./vault-secret.sh
          ./vault-secret.sh
          # Start with explicit .env file reference to ensure variables are loaded
          docker compose --env-file .env up -d
