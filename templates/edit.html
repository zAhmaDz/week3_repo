<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-xl px-4 py-10">
        <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
            <h1 class="text-2xl font-semibold tracking-tight">Edit Task</h1>
            <p class="mt-1 text-sm text-slate-500">Make your change and save it.</p>

            <div class="mt-5 space-y-3">
                <input
                    type="text"
                    id="task-name"
                    value="{{ task.name }}"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-slate-500 focus:ring-1 focus:ring-slate-400"
                >

                <div class="flex items-center gap-2">
                    <button
                        type="button"
                        class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-700"
                        onclick="updateTask({{ task.id }})"
                    >
                        Update
                    </button>
                    <a
                        href="/"
                        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
                    >
                        Cancel
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script>
    function updateTask(id) {
        const newName = document.getElementById("task-name").value;
        fetch("/tasks/" + id, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        }).then(() => window.location.href = "/");
    }
    </script>
</body>
</html>
